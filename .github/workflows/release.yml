name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Read version from csproj ──────────────────────────────────────────
      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = ([xml](Get-Content src/InputBusX.WebShell/InputBusX.WebShell.csproj)).Project.PropertyGroup.Version
          "VERSION=$v"  | Out-File $env:GITHUB_OUTPUT -Append
          "TAG=v$v"     | Out-File $env:GITHUB_OUTPUT -Append

      # ── Skip if this version was already released ─────────────────────────
      - name: Check existing tag
        id: guard
        shell: pwsh
        run: |
          $exists = git tag -l "${{ steps.ver.outputs.TAG }}"
          $skip = if ($exists) { 'true' } else { 'false' }
          "SKIP=$skip" | Out-File $env:GITHUB_OUTPUT -Append

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Setup .NET 8
        if: steps.guard.outputs.SKIP == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        if: steps.guard.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          # Velopack is incompatible with PublishSingleFile (it manages files
          # itself). Publish multi-file self-contained — vpk pack will then
          # produce both the legacy ZIP and the installer / update feed.
          dotnet publish src/InputBusX.WebShell/InputBusX.WebShell.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -f net8.0-windows10.0.19041.0 `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o dist
          Get-ChildItem dist -Recurse -Include *.pdb,*.xml | Remove-Item -Force

      # ── Velopack: installer + update feed ─────────────────────────────────
      - name: Install Velopack CLI
        if: steps.guard.outputs.SKIP == 'false'
        shell: pwsh
        run: dotnet tool install -g vpk

      - name: Pack release
        if: steps.guard.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          # Download previous releases so vpk produces a delta package.
          # First-time runs gracefully no-op when no prior release exists.
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          try {
            vpk download github `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --outputDir releases
          } catch {
            Write-Host "No prior Velopack release found — building first full package."
          }

          vpk pack `
            --packId ReflexX `
            --packVersion ${{ steps.ver.outputs.VERSION }} `
            --packDir dist `
            --mainExe ReflexX.exe `
            --packTitle "ReflexX" `
            --packAuthors "ReflexX" `
            --icon src/InputBusX.UI/Assets/matrixx-icon.ico `
            --outputDir releases

      # ── Legacy portable ZIP (kept for users on <3.0 manual installs) ──────
      - name: Package ZIP
        if: steps.guard.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          $zip = "ReflexX-${{ steps.ver.outputs.VERSION }}-win-x64.zip"
          Compress-Archive -Path dist/* -DestinationPath $zip
          "ZIP=$zip" | Out-File $env:GITHUB_OUTPUT -Append
        id: pkg

      # ── Release ───────────────────────────────────────────────────────────
      - name: Build release notes
        if: steps.guard.outputs.SKIP == 'false'
        shell: pwsh
        run: |
          $prev = git describe --tags --abbrev=0 2>$null
          if ($prev) {
            $log = git log "$prev..HEAD" --pretty="format:- %s" | Out-String
          } else {
            $log = git log --pretty="format:- %s" | Out-String
          }
          $log.Trim() | Out-File -Encoding utf8 release-notes.md

      - name: Create GitHub Release
        if: steps.guard.outputs.SKIP == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # Upload the Velopack artefacts (Setup.exe, *-full.nupkg, *-delta.nupkg,
          # releases.win.json) plus the legacy portable ZIP.
          $assets = @(
            "${{ steps.pkg.outputs.ZIP }}"
          )
          Get-ChildItem releases -File | ForEach-Object { $assets += $_.FullName }

          gh release create "${{ steps.ver.outputs.TAG }}" `
            $assets `
            --title "ReflexX ${{ steps.ver.outputs.TAG }}" `
            --notes-file release-notes.md
